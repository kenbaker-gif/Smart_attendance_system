<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — FaceAttend</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F3F4F6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo { font-size: 20px; font-weight: 700; color: #4F46E5; margin-bottom: 8px; }
    h1 { font-size: 22px; color: #111827; margin-bottom: 6px; }
    p.sub { font-size: 14px; color: #6B7280; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border .15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #4F46E5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button[type="submit"]:hover { background: #4338CA; }
    button[type="submit"]:disabled { background: #A5B4FC; cursor: not-allowed; }
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .message.success { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
    .message.error   { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
    .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: #6B7280; }
    .back-link a { color: #4F46E5; text-decoration: none; }
    .strength-bar { height: 4px; border-radius: 2px; background: #E5E7EB; margin-top: -12px; margin-bottom: 16px; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">FaceAttend</div>
  <div id="message" class="message"></div>

  <!-- FORGOT PASSWORD (shown when no token in URL) -->
  <div id="view-forgot">
    <h1>Forgot Password</h1>
    <p class="sub">Enter your account email and we'll send you a reset link.</p>
    <form id="form-forgot" onsubmit="handleForgot(event)">
      <label for="forgot-email">Email address</label>
      <input type="email" id="forgot-email" placeholder="you@university.edu" required autocomplete="email">
      <button type="submit" id="btn-forgot">Send Reset Link</button>
    </form>
    <div class="back-link"><a href="/login">← Back to login</a></div>
  </div>

  <!-- SET NEW PASSWORD (shown when token present in URL hash) -->
  <div id="view-reset" style="display:none;">
    <h1>Set New Password</h1>
    <p class="sub">Choose a strong password for your FaceAttend account.</p>
    <form id="form-reset" onsubmit="handleReset(event)">
      <label for="new-password">New password</label>
      <input type="password" id="new-password" placeholder="Min. 8 characters"
             required minlength="8" oninput="updateStrength(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <label for="confirm-password">Confirm password</label>
      <input type="password" id="confirm-password" placeholder="Repeat password" required minlength="8">
      <button type="submit" id="btn-reset">Update Password</button>
    </form>
    <div class="back-link"><a href="/login">← Back to login</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL  = 'https://xrlsltunfgjxooyyrora.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhybHNsdHVuZmdqeG9veXlyb3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNDczODEsImV4cCI6MjA4MDYyMzM4MX0.BWr27wHWGt6a3gWnD2ocGdQBL0_sH0HK-YHUcJsrlC0';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Helpers (defined first so IIFE can use them) ───────────────────────
  function getHashParams() {
    const hash = window.location.hash.substring(1);
    return Object.fromEntries(new URLSearchParams(hash));
  }

  function showMessage(text, type = 'success') {
    const el = document.getElementById('message');
    el.textContent   = text;
    el.className     = `message ${type}`;
    el.style.display = '';
  }

  function updateStrength(pw) {
    const fill = document.getElementById('strength-fill');
    let score = 0;
    if (pw.length >= 8)          score++;
    if (pw.length >= 12)         score++;
    if (/[A-Z]/.test(pw))        score++;
    if (/[0-9]/.test(pw))        score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const colors = ['#EF4444','#F59E0B','#F59E0B','#10B981','#10B981'];
    fill.style.width      = `${(score / 5) * 100}%`;
    fill.style.background = colors[score - 1] || '#E5E7EB';
  }

  // ── Init: detect recovery token and set session ────────────────────────
  (async () => {
    const hashParams = getHashParams();
    const isRecovery = hashParams.type === 'recovery' && hashParams.access_token;

    if (isRecovery) {
      document.getElementById('view-forgot').style.display = 'none';
      document.getElementById('view-reset').style.display  = '';

      const { error } = await sb.auth.setSession({
        access_token:  hashParams.access_token,
        refresh_token: hashParams.refresh_token || '',
      });

      if (error) {
        showMessage('Reset link is invalid or has expired. Please request a new one.', 'error');
        document.getElementById('btn-reset').disabled = true;
      }
    }
  })();

  // ── Forgot password handler ────────────────────────────────────────────
  async function handleForgot(e) {
    e.preventDefault();
    const email = document.getElementById('forgot-email').value.trim();
    const btn   = document.getElementById('btn-forgot');
    btn.disabled    = true;
    btn.textContent = 'Sending…';

    try {
      const res = await fetch('/auth/forgot-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
      });
      const data = await res.json();
      showMessage(data.message || 'Reset link sent! Check your email.', 'success');
      document.getElementById('form-forgot').reset();
    } catch (err) {
      showMessage('Something went wrong. Please try again.', 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Send Reset Link';
    }
  }

  // ── Set new password handler ───────────────────────────────────────────
  async function handleReset(e) {
    e.preventDefault();
    const pw1 = document.getElementById('new-password').value;
    const pw2 = document.getElementById('confirm-password').value;
    const btn = document.getElementById('btn-reset');

    if (pw1 !== pw2) {
      showMessage('Passwords do not match.', 'error');
      return;
    }
    btn.disabled    = true;
    btn.textContent = 'Updating…';

    try {
      const { error } = await sb.auth.updateUser({ password: pw1 });
      if (error) throw error;
      showMessage('Password updated! Redirecting to login…', 'success');
      setTimeout(() => { window.location.href = '/login'; }, 2500);
    } catch (err) {
      showMessage(err.message || 'Failed to update password. The link may have expired.', 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Update Password';
    }
  }
</script>
</body>
</html>
