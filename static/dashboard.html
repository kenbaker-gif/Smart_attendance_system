<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FaceAttend — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --black:   #080810;
  --surface: #0f0f1c;
  --border:  #1a1a2e;
  --cyan:    #00f5c4;
  --orange:  #ff6b35;
  --blue:    #4a9eff;
  --purple:  #a78bfa;
  --white:   #eeeef5;
  --muted:   #5a5a7a;
  --red:     #ff5050;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  min-height: 100vh;
}
.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.3;
  pointer-events: none;
  z-index: 0;
}

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 24px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px;
  width: 100%; max-width: 400px;
  position: relative; z-index: 1;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1.4rem;
  letter-spacing: -0.03em;
  margin-bottom: 32px; text-align: center;
}
.logo span { color: var(--cyan); }
.login-card h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem; font-weight: 800;
  text-align: center; margin-bottom: 6px;
}
.login-card p {
  color: var(--muted); font-size: 0.88rem;
  text-align: center; margin-bottom: 32px;
}
.form-group { margin-bottom: 16px; }
label {
  display: block; font-size: 0.72rem;
  color: var(--muted); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 8px;
}
input[type="email"], input[type="password"] {
  width: 100%; background: var(--black);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.95rem; outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--cyan); }
.btn {
  width: 100%; background: var(--cyan);
  color: var(--black); padding: 14px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 0.9rem;
  letter-spacing: 0.05em; border: none;
  cursor: pointer; margin-top: 8px;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
}
.btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,245,196,0.3);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg {
  background: rgba(255,80,80,0.08);
  border: 1px solid rgba(255,80,80,0.2);
  color: var(--red); border-radius: 8px;
  padding: 12px 16px; font-size: 0.85rem;
  margin-top: 16px; display: none;
}

/* ── DASHBOARD ── */
#dashboard-screen { display: none; position: relative; z-index: 1; }

nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1.1rem;
}
.nav-logo span { color: var(--cyan); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-user {
  font-size: 0.8rem; color: var(--muted);
}
.btn-logout {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted); padding: 6px 14px;
  border-radius: 6px; font-size: 0.78rem;
  cursor: pointer; transition: border-color 0.2s, color 0.2s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

.main { padding: 32px; max-width: 1400px; margin: 0 auto; }

/* Metrics */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 32px;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 24px;
  position: relative; overflow: hidden;
}
.metric-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}
.metric-card.cyan::before   { background: var(--cyan); }
.metric-card.blue::before   { background: var(--blue); }
.metric-card.orange::before { background: var(--orange); }
.metric-card.purple::before { background: var(--purple); }
.metric-label {
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 10px;
}
.metric-value {
  font-family: 'Syne', sans-serif;
  font-size: 2.2rem; font-weight: 800;
  line-height: 1;
}
.metric-sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

/* Section */
.section-header {
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.2em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px; margin: 32px 0 16px;
}

/* Filters */
.filters {
  display: flex; gap: 12px; flex-wrap: wrap;
  margin-bottom: 20px; align-items: center;
}
select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.85rem; outline: none;
  cursor: pointer;
}
select:focus { border-color: var(--cyan); }
.btn-refresh {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--cyan); padding: 8px 16px;
  border-radius: 8px; font-size: 0.82rem;
  cursor: pointer; transition: border-color 0.2s;
}
.btn-refresh:hover { border-color: var(--cyan); }
.btn-export {
  background: var(--cyan); color: var(--black);
  border: none; padding: 8px 16px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 0.8rem;
  cursor: pointer; margin-left: auto;
}

/* Table */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: rgba(0,0,0,0.3); }
th {
  padding: 12px 16px; text-align: left;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 500; border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px; font-size: 0.85rem;
  border-bottom: 1px solid rgba(26,26,46,0.5);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge {
  display: inline-block; padding: 2px 10px;
  border-radius: 100px; font-size: 0.68rem;
  font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase;
}
.badge-success { background: rgba(0,245,196,0.1); color: var(--cyan);   border: 1px solid rgba(0,245,196,0.2); }
.badge-failed  { background: rgba(255,80,80,0.1);  color: var(--red);    border: 1px solid rgba(255,80,80,0.2); }
.badge-spoof   { background: rgba(255,107,53,0.1); color: var(--orange); border: 1px solid rgba(255,107,53,0.2); }

.table-footer {
  padding: 12px 16px;
  font-size: 0.75rem; color: var(--muted);
  border-top: 1px solid var(--border);
}

/* Loading */
.loading {
  text-align: center; padding: 48px;
  color: var(--muted); font-size: 0.9rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">Face<span>Attend</span></div>
    <h2>Admin Dashboard</h2>
    <p>Sign in with your admin account to continue</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@faceattend.app"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password"/>
    </div>
    <button class="btn" id="login-btn" onclick="login()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <nav>
    <div class="nav-logo">Face<span>Attend</span> <span style="color:var(--muted);font-size:0.75rem;font-weight:400;margin-left:8px;">ADMIN</span></div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">
    <!-- Metrics -->
    <div class="metrics-grid" id="metrics">
      <div class="loading"><div class="spinner"></div>Loading...</div>
    </div>

    <!-- Filters -->
    <div class="section-header">Attendance Records</div>
    <div class="filters">
      <select id="filter-inst" onchange="applyFilters()">
        <option value="">All Institutions</option>
      </select>
      <select id="filter-status" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="success">Success</option>
        <option value="failed">Failed</option>
        <option value="spoof">Spoof</option>
      </select>
      <button class="btn-refresh" onclick="loadData()">↺ Refresh</button>
      <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="table-wrap">
      <div class="loading"><div class="spinner"></div>Loading records...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL     = "https://xrlsltunfgjxooyyrora.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhybHNsdHVuZmdqeG9veXlyb3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNDczODEsImV4cCI6MjA4MDYyMzM4MX0.BWr27wHWGt6a3gWnD2ocGdQBL0_sH0HK-YHUcJsrlC0";
const API_URL          = "https://smartattendancemvp-production.up.railway.app";
const DAZZLING_URL     = "https://faceattend.app";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentToken = null;
let allRecords   = [];

// ── Check existing session ──
window.addEventListener('load', async () => {
  const { data: { session } } = await client.auth.getSession();
  if (session) {
    await initDashboard(session);
  }
});

// ── Login ──
async function login() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('login-error');

  if (!email || !password) {
    showLoginError("Please enter email and password.");
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  const { data, error } = await client.auth.signInWithPassword({ email, password });

  if (error) {
    showLoginError(error.message);
    btn.disabled    = false;
    btn.textContent = 'Sign In';
    return;
  }

  // Check is_admin
  const { data: profile } = await client
    .from('profiles')
    .select('is_admin')
    .eq('id', data.user.id)
    .single();

  if (!profile || !profile.is_admin) {
    showLoginError("Access denied. Admin account required.");
    await client.auth.signOut();
    btn.disabled    = false;
    btn.textContent = 'Sign In';
    return;
  }

  await initDashboard(data.session);
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent    = msg;
  el.style.display  = 'block';
}

async function initDashboard(session) {
  currentToken = session.access_token;
  document.getElementById('login-screen').style.display    = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
  document.getElementById('nav-user').textContent = session.user.email;
  await loadData();
}

// ── Logout ──
async function logout() {
  await client.auth.signOut();
  currentToken = null;
  allRecords   = [];
  document.getElementById('login-screen').style.display    = 'flex';
  document.getElementById('dashboard-screen').style.display = 'none';
}

// ── Load data ──
async function loadData() {
  if (!currentToken) return;
  const headers = { 'Authorization': `Bearer ${currentToken}` };

  // Fetch records
  document.getElementById('table-wrap').innerHTML = '<div class="loading"><div class="spinner"></div>Loading records...</div>';

  try {
    const [recResp, studResp] = await Promise.all([
      fetch(`${API_URL}/admin/attendance-records?limit=1000`, { headers }),
      fetch(`${DAZZLING_URL}/students`, { headers }),
    ]);

    const records  = recResp.ok  ? await recResp.json()  : [];
    const studData = studResp.ok ? await studResp.json() : { count: 0 };

    allRecords = Array.isArray(records) ? records : [];
    const totalStudents = studData.count || 0;

    // Metrics
    const total    = allRecords.length;
    const verified = allRecords.filter(r => r.verified === 'success').length;
    const failed   = allRecords.filter(r => r.verified === 'failed').length;
    const spoofs   = allRecords.filter(r => r.verified === 'spoof').length;
    const rate     = total > 0 ? Math.round(verified / total * 100) : 0;

    document.getElementById('metrics').innerHTML = `
      <div class="metric-card cyan">
        <div class="metric-label">Verified</div>
        <div class="metric-value">${verified}</div>
        <div class="metric-sub">successful scans</div>
      </div>
      <div class="metric-card blue">
        <div class="metric-label">Total Students</div>
        <div class="metric-value">${totalStudents}</div>
        <div class="metric-sub">enrolled</div>
      </div>
      <div class="metric-card orange">
        <div class="metric-label">Failed + Spoofs</div>
        <div class="metric-value">${failed + spoofs}</div>
        <div class="metric-sub">${spoofs} spoof attempts</div>
      </div>
      <div class="metric-card purple">
        <div class="metric-label">Success Rate</div>
        <div class="metric-value">${rate}%</div>
        <div class="metric-sub">recognition accuracy</div>
      </div>
    `;

    // Populate institution filter
    const insts = [...new Set(allRecords.map(r => r.institution_id).filter(Boolean))].sort();
    const instSelect = document.getElementById('filter-inst');
    instSelect.innerHTML = '<option value="">All Institutions</option>' +
      insts.map(i => `<option value="${i}">${i}</option>`).join('');

    renderTable(allRecords);

  } catch (e) {
    document.getElementById('table-wrap').innerHTML = `<div class="loading" style="color:var(--red)">Failed to load data: ${e.message}</div>`;
  }
}

// ── Filters ──
function applyFilters() {
  const inst   = document.getElementById('filter-inst').value;
  const status = document.getElementById('filter-status').value;

  let filtered = allRecords;
  if (inst)   filtered = filtered.filter(r => r.institution_id === inst);
  if (status) filtered = filtered.filter(r => r.verified === status);

  renderTable(filtered);
}

// ── Render table ──
function renderTable(records) {
  if (!records.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="loading">No records found.</div>';
    return;
  }

  const rows = records.map(r => {
    const ts   = r.timestamp ? new Date(r.timestamp).toLocaleString('en-GB', { timeZone: 'Africa/Nairobi' }) : '—';
    const conf = r.confidence ? (r.confidence * 100).toFixed(1) + '%' : '—';
    const badge = r.verified === 'success'
      ? '<span class="badge badge-success">Success</span>'
      : r.verified === 'spoof'
        ? '<span class="badge badge-spoof">Spoof</span>'
        : '<span class="badge badge-failed">Failed</span>';

    return `<tr>
      <td>${r.student_id || '—'}</td>
      <td>${badge}</td>
      <td>${conf}</td>
      <td>${r.institution_id || '—'}</td>
      <td style="color:var(--muted)">${ts}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Student ID</th>
          <th>Status</th>
          <th>Confidence</th>
          <th>Institution</th>
          <th>Time (EAT)</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="table-footer">${records.length} records</div>
  `;
}

// ── Export CSV ──
function exportCSV() {
  const inst   = document.getElementById('filter-inst').value;
  const status = document.getElementById('filter-status').value;

  let filtered = allRecords;
  if (inst)   filtered = filtered.filter(r => r.institution_id === inst);
  if (status) filtered = filtered.filter(r => r.verified === status);

  const header = ['student_id', 'verified', 'confidence', 'institution_id', 'timestamp'];
  const rows   = filtered.map(r => header.map(k => r[k] ?? '').join(','));
  const csv    = [header.join(','), ...rows].join('\n');
  const blob   = new Blob([csv], { type: 'text/csv' });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  a.href       = url;
  a.download   = `attendance_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Enter key on login ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    login();
  }
});
</script>
</body>
</html>
