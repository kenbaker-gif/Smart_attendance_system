<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FaceAttend — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --black:   #080810;
  --surface: #0f0f1c;
  --border:  #1a1a2e;
  --cyan:    #00f5c4;
  --orange:  #ff6b35;
  --blue:    #4a9eff;
  --purple:  #a78bfa;
  --white:   #eeeef5;
  --muted:   #5a5a7a;
  --red:     #ff5050;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  min-height: 100vh;
}
.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.3;
  pointer-events: none;
  z-index: 0;
}

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 24px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px;
  width: 100%; max-width: 400px;
  position: relative; z-index: 1;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1.4rem;
  letter-spacing: -0.03em;
  margin-bottom: 32px; text-align: center;
}
.logo span { color: var(--cyan); }
.login-card h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem; font-weight: 800;
  text-align: center; margin-bottom: 6px;
}
.login-card p {
  color: var(--muted); font-size: 0.88rem;
  text-align: center; margin-bottom: 32px;
}
.form-group { margin-bottom: 16px; }
label {
  display: block; font-size: 0.72rem;
  color: var(--muted); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 8px;
}
input[type="email"], input[type="password"] {
  width: 100%; background: var(--black);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.95rem; outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--cyan); }
.btn {
  width: 100%; background: var(--cyan);
  color: var(--black); padding: 14px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 0.9rem;
  letter-spacing: 0.05em; border: none;
  cursor: pointer; margin-top: 8px;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
}
.btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,245,196,0.3);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg {
  background: rgba(255,80,80,0.08);
  border: 1px solid rgba(255,80,80,0.2);
  color: var(--red); border-radius: 8px;
  padding: 12px 16px; font-size: 0.85rem;
  margin-top: 16px; display: none;
}

/* ── DASHBOARD ── */
#dashboard-screen { display: none; position: relative; z-index: 1; }

nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1.1rem;
}
.nav-logo span { color: var(--cyan); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-user { font-size: 0.8rem; color: var(--muted); }
.nav-inst {
  font-size: 0.75rem; color: var(--cyan);
  background: rgba(0,245,196,0.08);
  border: 1px solid rgba(0,245,196,0.2);
  padding: 3px 10px; border-radius: 100px;
}
.btn-logout {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted); padding: 6px 14px;
  border-radius: 6px; font-size: 0.78rem;
  cursor: pointer; transition: border-color 0.2s, color 0.2s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

.main { padding: 32px; max-width: 1400px; margin: 0 auto; }

/* Metrics */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 32px;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 24px;
  position: relative; overflow: hidden;
}
.metric-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}
.metric-card.cyan::before   { background: var(--cyan); }
.metric-card.blue::before   { background: var(--blue); }
.metric-card.orange::before { background: var(--orange); }
.metric-card.purple::before { background: var(--purple); }
.metric-label {
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 10px;
}
.metric-value {
  font-family: 'Syne', sans-serif;
  font-size: 2.2rem; font-weight: 800;
  line-height: 1;
}
.metric-sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

/* Tabs */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.tab-btn {
  background: transparent; border: none;
  color: var(--muted); padding: 10px 24px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.85rem; cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Section */
.section-header {
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.2em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px; margin: 0 0 16px;
}

/* Filters */
.filters {
  display: flex; gap: 12px; flex-wrap: wrap;
  margin-bottom: 20px; align-items: center;
}
select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  color: var(--white);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.85rem; outline: none;
  cursor: pointer;
}
select:focus { border-color: var(--cyan); }
.btn-refresh {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--cyan); padding: 8px 16px;
  border-radius: 8px; font-size: 0.82rem;
  cursor: pointer; transition: border-color 0.2s;
}
.btn-refresh:hover { border-color: var(--cyan); }
.btn-export {
  background: var(--cyan); color: var(--black);
  border: none; padding: 8px 16px;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 0.8rem;
  cursor: pointer; margin-left: auto;
}

/* Table */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead { background: rgba(0,0,0,0.3); }
th {
  padding: 12px 16px; text-align: left;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 500; border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px; font-size: 0.85rem;
  border-bottom: 1px solid rgba(26,26,46,0.5);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.badge {
  display: inline-block; padding: 2px 10px;
  border-radius: 100px; font-size: 0.68rem;
  font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase;
}
.badge-success { background: rgba(0,245,196,0.1); color: var(--cyan);   border: 1px solid rgba(0,245,196,0.2); }
.badge-failed  { background: rgba(255,80,80,0.1);  color: var(--red);    border: 1px solid rgba(255,80,80,0.2); }
.badge-spoof   { background: rgba(255,107,53,0.1); color: var(--orange); border: 1px solid rgba(255,107,53,0.2); }

.btn-delete {
  background: transparent;
  border: 1px solid rgba(255,80,80,0.3);
  color: var(--red); padding: 4px 10px;
  border-radius: 6px; font-size: 0.75rem;
  cursor: pointer; transition: background 0.2s, border-color 0.2s;
}
.btn-delete:hover { background: rgba(255,80,80,0.1); border-color: var(--red); }

.table-footer {
  padding: 12px 16px;
  font-size: 0.75rem; color: var(--muted);
  border-top: 1px solid var(--border);
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; display: none;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 32px;
  max-width: 380px; width: 100%; margin: 16px;
}
.modal h3 {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem; margin-bottom: 12px;
}
.modal p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
.btn-cancel {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); padding: 8px 18px;
  border-radius: 8px; cursor: pointer; font-size: 0.85rem;
}
.btn-confirm-delete {
  background: var(--red); border: none;
  color: white; padding: 8px 18px;
  border-radius: 8px; cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 0.85rem;
}

/* Loading */
.loading {
  text-align: center; padding: 48px;
  color: var(--muted); font-size: 0.9rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">Face<span>Attend</span></div>
    <h2>Admin Dashboard</h2>
    <p>Sign in with your admin account to continue</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@faceattend.app" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" autocomplete="off"/>
    </div>
    <button class="btn" id="login-btn" onclick="login()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>Delete Student</h3>
    <p id="delete-modal-msg">Are you sure? This will remove all photos and attendance records permanently.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <nav>
    <div class="nav-logo">Face<span>Attend</span> <span style="color:var(--muted);font-size:0.75rem;font-weight:400;margin-left:8px;">ADMIN</span></div>
    <div class="nav-right">
      <span class="nav-inst" id="nav-inst" style="display:none"></span>
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">
    <div class="metrics-grid" id="metrics">
      <div class="loading"><div class="spinner"></div>Loading...</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('attendance')">Attendance Records</button>
      <button class="tab-btn" onclick="switchTab('students')">Students</button>
    </div>

    <!-- Attendance Tab -->
    <div class="tab-panel active" id="tab-attendance">
      <div class="filters">
        <select id="filter-inst" onchange="applyFilters()">
          <option value="">All Institutions</option>
        </select>
        <select id="filter-status" onchange="applyFilters()">
          <option value="">All Status</option>
          <option value="success">Success</option>
          <option value="failed">Failed</option>
          <option value="spoof">Spoof</option>
        </select>
        <button class="btn-refresh" onclick="loadData()">↺ Refresh</button>
        <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
      </div>
      <div class="table-wrap" id="table-wrap">
        <div class="loading"><div class="spinner"></div>Loading records...</div>
      </div>
    </div>

    <!-- Students Tab -->
    <div class="tab-panel" id="tab-students">
      <div class="filters">
        <button class="btn-refresh" onclick="loadStudents()">↺ Refresh</button>
      </div>
      <div class="table-wrap" id="students-table-wrap">
        <div class="loading"><div class="spinner"></div>Loading students...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = "https://xrlsltunfgjxooyyrora.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhybHNsdHVuZmdqeG9veXlyb3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNDczODEsImV4cCI6MjA4MDYyMzM4MX0.BWr27wHWGt6a3gWnD2ocGdQBL0_sH0HK-YHUcJsrlC0";
const API_URL           = "https://smartattendancemvp-production.up.railway.app";
const DAZZLING_URL      = "https://faceattend.app";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentToken         = null;
let currentInstitutionId = null;
let allRecords           = [];
let pendingDeleteId      = null;
let pendingDeleteName    = null;

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'attendance') || (i === 1 && tab === 'students'));
  });
  document.getElementById('tab-attendance').classList.toggle('active', tab === 'attendance');
  document.getElementById('tab-students').classList.toggle('active', tab === 'students');
  if (tab === 'students') loadStudents();
}

// ── Auto-login from Flutter WebView token injection ──────────────────────
async function autoLoginWithToken(accessToken, refreshToken) {
  if (!accessToken) return;
  try {
    const { data, error } = await client.auth.setSession({
      access_token:  accessToken,
      refresh_token: refreshToken,
    });
    if (data?.session) {
      await initDashboard(data.session);
    }
  } catch (e) {
    console.error('Auto-login failed:', e);
  }
}

// ── Check existing session on page load ─────────────────────────────────
window.addEventListener('load', async () => {
  const { data: { session } } = await client.auth.getSession();
  if (session) {
    await initDashboard(session);
  }
});

// ── Manual login ─────────────────────────────────────────────────────────
async function login() {
  const emailEl    = document.getElementById('login-email');
  const passwordEl = document.getElementById('login-password');
  const email      = emailEl.value.trim();
  const password   = passwordEl.value;
  const btn        = document.getElementById('login-btn');
  const errEl      = document.getElementById('login-error');

  if (!email || !password) {
    showLoginError("Please enter email and password.");
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  const { data, error } = await client.auth.signInWithPassword({ email, password });

  if (error) {
    showLoginError(error.message);
    btn.disabled    = false;
    btn.textContent = 'Sign In';
    return;
  }

  // Check is_admin
  const { data: profile } = await client
    .from('profiles')
    .select('is_admin')
    .eq('id', data.user.id)
    .single();

  if (!profile || !profile.is_admin) {
    showLoginError("Access denied. Admin account required.");
    await client.auth.signOut();
    btn.disabled    = false;
    btn.textContent = 'Sign In';
    return;
  }

  // ✅ Clear fields after successful login
  emailEl.value    = '';
  passwordEl.value = '';
  btn.disabled     = false;
  btn.textContent  = 'Sign In';

  await initDashboard(data.session);
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent   = msg;
  el.style.display = 'block';
}

// ── Init dashboard ───────────────────────────────────────────────────────
async function initDashboard(session) {
  currentToken = session.access_token;

  const { data: profile } = await client
    .from('profiles')
    .select('institution_id')
    .eq('id', session.user.id)
    .single();

  currentInstitutionId = profile?.institution_id || null;

  // ✅ Switch screens without refresh
  document.getElementById('login-screen').style.display    = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
  document.getElementById('nav-user').textContent = session.user.email;

  if (currentInstitutionId) {
    const instEl = document.getElementById('nav-inst');
    instEl.textContent    = currentInstitutionId;
    instEl.style.display  = 'inline-block';
    document.getElementById('filter-inst').style.display = 'none';
  }

  await loadData();
}

// ── Logout ───────────────────────────────────────────────────────────────
async function logout() {
  await client.auth.signOut();
  currentToken         = null;
  currentInstitutionId = null;
  allRecords           = [];

  // ✅ Clear fields on logout so next user sees empty form
  document.getElementById('login-email').value    = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').style.display = 'none';

  document.getElementById('login-screen').style.display    = 'flex';
  document.getElementById('dashboard-screen').style.display = 'none';
}

// ── Load data ────────────────────────────────────────────────────────────
async function loadData() {
  if (!currentToken) return;
  const headers = { 'Authorization': `Bearer ${currentToken}` };

  document.getElementById('table-wrap').innerHTML =
    '<div class="loading"><div class="spinner"></div>Loading records...</div>';

  try {
    const instParam = currentInstitutionId ? `&institution_id=${currentInstitutionId}` : '';
    const instQuery = currentInstitutionId ? `?institution_id=${currentInstitutionId}` : '';

    const [recResp, studResp] = await Promise.all([
      fetch(`${API_URL}/admin/attendance-records?limit=1000${instParam}`, { headers }),
      fetch(`${DAZZLING_URL}/students${instQuery}`, { headers }),
    ]);

    const records  = recResp.ok  ? await recResp.json()  : [];
    const studData = studResp.ok ? await studResp.json() : { count: 0 };

    allRecords = Array.isArray(records) ? records : [];
    const totalStudents = studData.count || 0;

    const total    = allRecords.length;
    const verified = allRecords.filter(r => r.verified === 'success').length;
    const failed   = allRecords.filter(r => r.verified === 'failed').length;
    const spoofs   = allRecords.filter(r => r.verified === 'spoof').length;
    const rate     = total > 0 ? Math.round(verified / total * 100) : 0;

    document.getElementById('metrics').innerHTML = `
      <div class="metric-card cyan">
        <div class="metric-label">Verified</div>
        <div class="metric-value">${verified}</div>
        <div class="metric-sub">successful scans</div>
      </div>
      <div class="metric-card blue">
        <div class="metric-label">Total Students</div>
        <div class="metric-value">${totalStudents}</div>
        <div class="metric-sub">enrolled</div>
      </div>
      <div class="metric-card orange">
        <div class="metric-label">Failed + Spoofs</div>
        <div class="metric-value">${failed + spoofs}</div>
        <div class="metric-sub">${spoofs} spoof attempts</div>
      </div>
      <div class="metric-card purple">
        <div class="metric-label">Success Rate</div>
        <div class="metric-value">${rate}%</div>
        <div class="metric-sub">recognition accuracy</div>
      </div>
    `;

    if (!currentInstitutionId) {
      const insts = [...new Set(allRecords.map(r => r.institution_id).filter(Boolean))].sort();
      document.getElementById('filter-inst').innerHTML =
        '<option value="">All Institutions</option>' +
        insts.map(i => `<option value="${i}">${i}</option>`).join('');
    }

    renderTable(allRecords);

  } catch (e) {
    document.getElementById('table-wrap').innerHTML =
      `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

// ── Load students tab ────────────────────────────────────────────────────
async function loadStudents() {
  if (!currentToken) return;
  const headers  = { 'Authorization': `Bearer ${currentToken}` };
  const instQuery = currentInstitutionId ? `?institution_id=${currentInstitutionId}` : '';

  document.getElementById('students-table-wrap').innerHTML =
    '<div class="loading"><div class="spinner"></div>Loading students...</div>';

  try {
    const resp = await fetch(`${DAZZLING_URL}/students${instQuery}`, { headers });
    const data = resp.ok ? await resp.json() : { students: [] };
    const students = data.students || [];

    if (!students.length) {
      document.getElementById('students-table-wrap').innerHTML =
        '<div class="loading">No students registered.</div>';
      return;
    }

    const rows = students.map(s => `
      <tr>
        <td>${s.id || '—'}</td>
        <td>${s.name || '—'}</td>
        <td>${s.institution_id || '—'}</td>
        <td>
          <button class="btn-delete" onclick="openDeleteModal('${s.id}', '${(s.name || '').replace(/'/g, "\\'")}')">
            Delete
          </button>
        </td>
      </tr>
    `).join('');

    document.getElementById('students-table-wrap').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Institution</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="table-footer">${students.length} students</div>
    `;
  } catch (e) {
    document.getElementById('students-table-wrap').innerHTML =
      `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

// ── Delete modal ─────────────────────────────────────────────────────────
function openDeleteModal(studentId, studentName) {
  pendingDeleteId   = studentId;
  pendingDeleteName = studentName;
  document.getElementById('delete-modal-msg').textContent =
    `Are you sure you want to delete ${studentName}? This will remove all their photos and attendance records permanently.`;
  document.getElementById('delete-modal').classList.add('visible');
}

function closeDeleteModal() {
  pendingDeleteId   = null;
  pendingDeleteName = null;
  document.getElementById('delete-modal').classList.remove('visible');
}

async function confirmDelete() {
  if (!pendingDeleteId || !currentToken) return;

  const studentId   = pendingDeleteId;
  const studentName = pendingDeleteName;
  closeDeleteModal();

  try {
    const resp = await fetch(`${DAZZLING_URL}/students/${studentId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${currentToken}` },
    });

    if (resp.ok) {
      await loadStudents();
      await loadData(); // refresh metrics too
    } else {
      const err = await resp.json();
      alert(`Failed to delete: ${err.detail || 'Unknown error'}`);
    }
  } catch (e) {
    alert(`Error: ${e.message}`);
  }
}

// ── Filters ──────────────────────────────────────────────────────────────
function applyFilters() {
  const inst   = document.getElementById('filter-inst').value;
  const status = document.getElementById('filter-status').value;
  let filtered = allRecords;
  if (inst)   filtered = filtered.filter(r => r.institution_id === inst);
  if (status) filtered = filtered.filter(r => r.verified === status);
  renderTable(filtered);
}

// ── Render attendance table ───────────────────────────────────────────────
function renderTable(records) {
  if (!records.length) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="loading">No records found.</div>';
    return;
  }

  const rows = records.map(r => {
    const ts   = r.timestamp
      ? new Date(r.timestamp).toLocaleString('en-GB', { timeZone: 'Africa/Nairobi' })
      : '—';
    const conf = r.confidence ? (r.confidence * 100).toFixed(1) + '%' : '—';
    const badge = r.verified === 'success'
      ? '<span class="badge badge-success">Success</span>'
      : r.verified === 'spoof'
        ? '<span class="badge badge-spoof">Spoof</span>'
        : '<span class="badge badge-failed">Failed</span>';

    return `<tr>
      <td>${r.student_id || '—'}</td>
      <td>${badge}</td>
      <td>${conf}</td>
      <td>${r.institution_id || '—'}</td>
      <td style="color:var(--muted)">${ts}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Student ID</th>
          <th>Status</th>
          <th>Confidence</th>
          <th>Institution</th>
          <th>Time (EAT)</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="table-footer">${records.length} records</div>
  `;
}

// ── Export CSV ────────────────────────────────────────────────────────────
function exportCSV() {
  const inst   = document.getElementById('filter-inst').value;
  const status = document.getElementById('filter-status').value;
  let filtered = allRecords;
  if (inst)   filtered = filtered.filter(r => r.institution_id === inst);
  if (status) filtered = filtered.filter(r => r.verified === status);

  const header = ['student_id', 'verified', 'confidence', 'institution_id', 'timestamp'];
  const rows   = filtered.map(r => header.map(k => r[k] ?? '').join(','));
  const csv    = [header.join(','), ...rows].join('\n');
  const blob   = new Blob([csv], { type: 'text/csv' });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  a.href       = url;
  a.download   = `attendance_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Enter key on login ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    login();
  }
});
</script>
